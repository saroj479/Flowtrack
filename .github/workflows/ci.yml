name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile dashboard.py
          python -m py_compile tracker.py
          python -m py_compile analyze.py

      - name: Import check
        run: |
          python -c "import ast; ast.parse(open('dashboard.py').read()); print('dashboard.py: AST OK')"
          python -c "import ast; ast.parse(open('tracker.py').read());   print('tracker.py:   AST OK')"
